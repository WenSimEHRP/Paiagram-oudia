name: Deploy converter to GitHub Pages

on:
  push:
    branches: ["main"]
    paths:
      - "crates/**/*"
      - ".github/workflows/deploy-converter-pages.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown

      - name: Cache Rust build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Cache Trunk binary
        id: cache-trunk
        uses: actions/cache@v5
        with:
          path: ~/.cargo/bin/trunk
          key: ${{ runner.os }}-trunk-0.21.14

      - name: Install Trunk
        if: steps.cache-trunk.outputs.cache-hit != 'true'
        run: cargo install trunk --locked --version 0.21.14

      - name: Build converter
        working-directory: crates/converter
        run: trunk build --release

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v6

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: crates/converter/dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v5
